name: Build Talk Messenger APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.2"
          channel: stable
          cache: true

      - name: Inject credentials
        run: |
          sed -i "s|SUPABASE_URL_PLACEHOLDER|${{ secrets.SUPABASE_URL }}|g" lib/main.dart
          sed -i "s|SUPABASE_ANON_KEY_PLACEHOLDER|${{ secrets.SUPABASE_ANON_KEY }}|g" lib/main.dart
          sed -i "s|SMSDEV_KEY_PLACEHOLDER|${{ secrets.SMSDEV_KEY }}|g" lib/main.dart
          sed -i "s|AGORA_APP_ID_PLACEHOLDER|${{ secrets.AGORA_APP_ID }}|g" lib/main.dart

      - name: Flutter pub get
        run: flutter pub get

      - name: Setup Android
        run: |
          mkdir -p ~/.android
          if [ -d "android" ]; then
            chmod +x android/gradlew || true
          else
            flutter create .
          fi

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: talk-messenger-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
